<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js 源码详解</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: oklch(62% 0.18 355);
            --primary-soft: oklch(95% 0.025 355);
            --primary-dark: oklch(48% 0.16 355);
            --success: oklch(70% 0.16 355);
            --success-soft: oklch(95% 0.035 355);
            --warning: oklch(75% 0.14 85);
            --warning-soft: oklch(95% 0.04 85);
            --danger: oklch(65% 0.2 25);
            --danger-soft: oklch(94% 0.04 25);
            --gray-100: oklch(97% 0.004 250);
            --gray-200: oklch(92% 0.006 250);
            --gray-300: oklch(86% 0.01 250);
            --gray-600: oklch(48% 0.018 250);
            --gray-800: oklch(26% 0.022 250);
            --gray-900: oklch(18% 0.018 250);
            --bg-color: oklch(98% 0.006 250);
            --card-bg: oklch(100% 0 0);
            --code-bg: oklch(18% 0.02 355);
            --border-radius: 10px;
            --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
            --shadow-lg: 0 18px 45px rgba(15, 23, 42, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at top left, oklch(94% 0.04 355), transparent 34rem),
                linear-gradient(180deg, oklch(99% 0.003 250) 0%, var(--bg-color) 34rem);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.82);
            color: var(--gray-900);
            padding: 1.25rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--gray-200);
            backdrop-filter: blur(18px);
        }

        .header-content {
            max-width: 1120px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: clamp(1.45rem, 2.4vw, 2.35rem);
            font-weight: 700;
        }

        .header p {
            color: var(--gray-600);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .project-tabs {
            max-width: 1120px;
            margin: 1.5rem auto 1rem;
            padding: 0 1.25rem;
            display: flex;
            gap: 0.625rem;
            flex-wrap: wrap;
        }

        .project-tab {
            display: inline-flex;
            align-items: center;
            padding: 0.7rem 1rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--gray-200);
            background: rgba(255, 255, 255, 0.76);
            color: var(--gray-800);
            min-height: 42px;
        }

        .project-tab:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .project-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .progress-section {
            max-width: 1120px;
            margin: 0 auto 1rem;
            padding: 0 1.25rem;
        }

        .progress-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .progress-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        .progress-percentage {
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 10px;
            background: var(--gray-200);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
            border-radius: 999px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .stat-completed .stat-icon {
            background: var(--success);
        }

        .stat-remaining .stat-icon {
            background: var(--gray-300);
        }

        .main-content {
            max-width: 1120px;
            margin: 0 auto;
            padding: 1rem 1.25rem 2rem;
        }

        .stage {
            margin-bottom: 1rem;
        }

        .stage-header {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }

        .stage-header:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .stage-number {
            width: 38px;
            height: 38px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .stage-number.completed {
            background: var(--success);
        }

        .stage-info {
            flex: 1;
        }

        .stage-title {
            font-weight: 700;
            font-size: 1.02rem;
            color: var(--gray-900);
        }

        .stage-subtitle {
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-top: 0.25rem;
        }

        .stage-progress {
            font-size: 0.9rem;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .stage-toggle {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .stage-toggle svg {
            width: 100%;
            height: 100%;
            fill: var(--gray-600);
        }

        .stage.expanded .stage-toggle {
            transform: rotate(180deg);
        }

        .chapter-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .chapter {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            margin-bottom: 0.75rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .stage .chapter-list .chapter {
            margin-left: 0.75rem;
            margin-right: 0.75rem;
        }

        .stage.expanded .chapter-list {
            max-height: 10000px;
            padding-top: 0.75rem;
        }

        .chapter.completed {
            border-color: var(--success);
            background: linear-gradient(90deg, var(--success-soft), var(--card-bg) 22%);
        }

        .chapter-header {
            padding: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
        }

        .chapter-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--gray-300);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            margin-top: 2px;
        }

        .chapter-checkbox:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .chapter.completed .chapter-checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .chapter-checkbox svg {
            width: 14px;
            height: 14px;
            fill: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chapter.completed .chapter-checkbox svg {
            opacity: 1;
        }

        .chapter-content {
            flex: 1;
            min-width: 0;
        }

        .chapter-title {
            font-weight: 700;
            font-size: 0.98rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            color: var(--gray-900);
        }

        .chapter-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.22rem 0.55rem;
            border-radius: 999px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .tag-frequency {
            background: var(--warning-soft);
            color: oklch(44% 0.11 68);
        }

        .tag-frequency.high {
            background: var(--danger-soft);
            color: oklch(43% 0.16 25);
        }

        .tag-frequency.medium {
            background: var(--warning-soft);
            color: oklch(44% 0.11 68);
        }

        .tag-frequency.low {
            background: var(--primary-soft);
            color: var(--primary-dark);
        }

        .tag-time {
            background: var(--gray-100);
            color: var(--gray-600);
            border-color: var(--gray-200);
        }

        .code-section {
            background: var(--code-bg);
            border-radius: 10px;
            margin-top: 1rem;
            overflow: hidden;
            border: 1px solid oklch(30% 0.025 355);
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: oklch(22% 0.025 355);
            border-bottom: 1px solid oklch(30% 0.025 355);
        }

        .code-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: oklch(85% 0.02 355);
        }

        .code-toggle {
            font-size: 0.85rem;
            color: oklch(85% 0.1 355);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-weight: 500;
        }

        .code-toggle:hover {
            text-decoration: underline;
        }

        .code-block {
            position: relative;
            background: oklch(15% 0.02 355);
            padding: 1rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: oklch(88% 0.02 355);
        }

        .code-line {
            display: flex;
            transition: background 0.15s ease;
            padding: 2px 0;
        }

        .code-line:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .line-number {
            color: oklch(60% 0.02 355);
            user-select: none;
            min-width: 3rem;
            text-align: right;
            padding-right: 1.5rem;
            font-weight: 500;
        }

        .line-content {
            flex: 1;
            white-space: pre;
            color: oklch(88% 0.02 355);
        }

        .code-comments {
            display: none;
            background: oklch(18% 0.02 355);
            padding: 0;
            padding-left: 5px;
            border-top: 1px solid oklch(30% 0.025 355);
        }

        .code-comments.show {
            display: block;
        }

        .comment-line {
            display: grid;
            grid-template-columns: 3rem minmax(0, 1fr);
            align-items: baseline;
            margin: 0;
            padding: 0.55rem 0.45rem;
            font-size: 0.9rem;
            line-height: 1.55;
            border-bottom: 1px solid oklch(25% 0.02 355);
        }

        .comment-line:last-child {
            border-bottom: 0;
        }

        .comment-line-number {
            color: oklch(85% 0.1 355);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            font-weight: 700;
            min-width: 34px;
            text-align: center;
            background: oklch(25% 0.04 355);
            padding: 0.18rem 0.35rem;
            border-radius: 6px;
        }

        .comment-text {
            color: oklch(88% 0.04 165);
            line-height: 1.55;
        }

        .pro-tip {
            background: oklch(18% 0.03 355);
            border: 1px solid oklch(45% 0.08 355);
            border-radius: 10px;
            padding: 1rem 1.1rem;
            margin-top: 0.85rem;
        }

        .pro-tip-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.65rem;
            font-weight: 700;
            color: oklch(80% 0.1 355);
            font-size: 0.9rem;
        }

        .pro-tip-header svg {
            width: 18px;
            height: 18px;
            fill: oklch(80% 0.1 355);
        }

        .pro-tip-content {
            font-size: 0.9rem;
            color: oklch(90% 0.03 355);
            line-height: 1.7;
        }

        .pro-tip-content code {
            display: block;
            background: oklch(15% 0.025 355);
            color: oklch(88% 0.04 355);
            padding: 0.75rem 0.85rem;
            border: 1px solid oklch(30% 0.05 355);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            line-height: 1.7;
            margin-top: 0.65rem;
        }

        /* 庆祝弹窗样式 */
        .celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .celebration-popup {
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 1.25rem 1.75rem;
            box-shadow: 
                0 20px 60px rgba(255, 182, 193, 0.3),
                0 8px 24px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            text-align: center;
            transform: scale(0);
            opacity: 0;
            animation: popupPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            min-width: 200px;
        }

        .celebration-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 200, 220, 0.3), rgba(255, 255, 255, 0.2));
            border-radius: 20px;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes popupPop {
            0% {
                transform: scale(0) rotate(-8deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.05) rotate(1deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .celebration-emoji {
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .celebration-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .celebration-message {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .celebration-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: #999;
        }

        .celebration-progress-bar {
            width: 80px;
            height: 6px;
            background: #eee;
            border-radius: 999px;
            overflow: hidden;
        }

        .celebration-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #ff8fab, #ffb3c6);
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        /* 烟花粒子 */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 0.8s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(400px) rotate(720deg) scale(0);
                opacity: 0;
            }
        }

        /* 打勾动画 */
        .chapter-checkbox.checked-anim {
            animation: checkPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes checkPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .footer {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--gray-600);
            font-size: 0.85rem;
        }

        @media (max-width: 820px) {
            .progress-stats {
                flex-direction: column;
                gap: 0.5rem;
            }

            .chapter-tags {
                gap: 0.3rem;
            }

            .tag {
                font-size: 0.65rem;
                padding: 0.15rem 0.4rem;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <h1>Node.js 源码详解</h1>
            <p>基于真实项目的代码分析</p>
        </div>
    </header>

    <div class="project-tabs">
        <div class="project-tab active" data-project="wc-backend" onclick="_switchProject('wc-backend')">
            Express + Sequelize
        </div>
        <div class="project-tab" data-project="tb-dock" onclick="_switchProject('tb-dock')">
            NestJS + Prisma
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-card">
            <div class="progress-header">
                <h2 id="progressTitle">wc-Backend 源码进度</h2>
                <div class="progress-percentage"><span id="progressPercent">0</span>%</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-stats">
                <div class="stat-item stat-completed"><span class="stat-icon"></span>已完成 <span
                        id="completedCount">0</span> / <span id="totalCount">0</span> 个知识点</div>
            </div>
        </div>
    </div>

    <main class="main-content" id="mainContent"></main>

    <footer class="footer">源码详解 · 基于真实项目分析</footer>

    <script>
        let currentProject = 'wc-backend';

        const projectInfo = {
            'wc-backend': { name: 'wc-Backend', totalTime: '约 8 小时' },
            'tb-dock': { name: 'tb-dock-server', totalTime: '约 6 小时' }
        };

        // wc-Backend 源码详解
        const wcBackendPlan = [
            {
                id: 1,
                title: "项目目录结构",
                subtitle: "Express + Sequelize 架构",
                totalTime: "30min",
                chapters: [
                    {
                        id: "1-1",
                        title: "wc-Backend 目录结构",
                        frequency: "高",
                        frequencyLevel: "medium",
                        time: "20min",
                        code: `wc_modelingtool_crossplatform/
├── src/
│   ├── app.js                      # Express 入口
│   ├── business/                   # 业务层
│   │   ├── model/                # Sequelize 模型
│   │   ├── repository/           # 数据访问层
│   │   └── service/              # 业务逻辑
│   ├── framework/                 # 基础设施
│   │   ├── datasource/          # 数据库连接
│   │   ├── route/               # 路由封装
│   │   └── utils/               # 工具函数
│   └── routes/                    # 路由定义
└── projects/                      # 用户数据`,
                        comments: [
                            { line: "2-3", text: "src/ 是核心目录，所有业务代码在此" },
                            { line: "5-7", text: "business 层采用 Model-Repository-Service 三层" },
                            { line: "8-10", text: "framework 封装通用工具，供业务层复用" }
                        ],
                        proTip: "三层架构记忆口诀：<br><code>Model 定义数据结构<br>Repository 操作数据库<br>Service 写业务逻辑</code>"
                    }
                ]
            },
            {
                id: 2,
                title: "异步编程基础",
                subtitle: "Promise · async/await · 并发控制",
                totalTime: "60min",
                chapters: [
                    {
                        id: "2-1",
                        title: "Promise 三种状态",
                        frequency: "极高",
                        frequencyLevel: "high",
                        time: "10min",
                        code: `// Promise 三种状态转换
const promise = new Promise((resolve, reject) => {
    // pending（待定）→ 初始状态
    if (success) {
        resolve(value);  // fulfilled（已兑现）
    } else {
        reject(error);   // rejected（已拒绝）
    }
});

// 链式调用
promise
    .then(result => console.log(result))
    .catch(err => console.error(err))
    .finally(() => console.log('完成'));`,
                        comments: [
                            { line: "3-4", text: "Promise 构造函数接受一个执行器函数，异步操作在这里执行" },
                            { line: "5-8", text: "resolve() 将 Promise 变为成功态，reject() 变为失败态，状态一旦改变就不可逆" },
                            { line: "11-15", text: "then/catch/finally 链式调用，每个方法都返回新的 Promise" }
                        ],
                        proTip: "状态记忆：<code>pending → fulfilled ✓<br>pending → rejected ✗</code>"
                    },
                    {
                        id: "2-2",
                        title: "async/await 完整示例",
                        frequency: "极高",
                        frequencyLevel: "high",
                        time: "25min",
                        code: `// 登录函数 - 演示 async/await 完整用法
async function login(param) {
    // 根据配置决定登录方式
    if (enableUAMServer) {
        // 方式一：调用外部 UAM 服务器

async withCalculateLock(projectId, calculateFn) {
    // 1. 尝试获取锁（乐观锁）
    const success = await projectRepository.startCalculate(projectId);
    if (!success) {
        throw new Error('工程正在计算');  // 已被占用
    }
    try {
        // 2. 执行计算任务
        return await calculateFn();
    } catch (e) {
        // 3. 出错时释放锁
        await projectRepository.stopCalculate(projectId);
        throw e;  // 重新抛出，不被吞掉
    } finally {

        await projectRepository.stopCalculate(projectId);
    }
}`,

// 生成 Token

    });
}

}

// 完整验证流程
async function authenticate(req, res, next) {
    const auth = req.headers.authorization;
    if (!auth?.startsWith('Bearer ')) {

    }

    } catch {

    }

export class JwtStrategy extends PassportStrategy(Strategy) {

@Injectable()
export class ValidatePipe implements PipeTransform {
    constructor(private validator: Validator) {}

    transform(value: any, { metatype, metadata }: ArgumentMetadata) {
        // DTO 类转字符串名，去除 "String", "Number" 等
        if (!metatype || !this.toValidate(metatype)) {
            return value;
        }
        // 校验并转换
        return this.validator.validate(value, { metatype });
    }

    private toValidate(metatype: Function): boolean {
        const types: Function[] = [String, Boolean, Number, Array, Object];
        return !types.includes(metatype);
    }
}

// 使用：全局注册

@Injectable()
export class ResWrapperInterceptor implements NestInterceptor {
    intercept(context: ExecutionContext, next: CallHandler): Observable<any> {
        return next.handle().pipe(
            map(data => ({
                data,           // 业务数据
                msg: 'succ',     // 固定成功消息
                code: 200       // HTTP 状态码
            }))
        );
    }
}

// src/filter/httpException.filter.ts
@Catch()
export class HttpExceptionFilter implements ExceptionFilter {
    catch(exception: HttpException, host: ArgumentsHost) {
        const ctx = host.switchToHttp();
        const res = ctx.getResponse();

        res.status(exception.getStatus()).json({
            data: null,
            msg: exception.message,
            code: exception.getStatus()
        });
    }
}`,

        }

        function createConfetti() {
            const colors = ['#ff6b9d', '#ff8fab', '#ffb3c6', '#ffc0cb', '#ffb6c1', '#ff69b4', '#ff1493', '#e0b0ff'];
            const confettiContainer = document.createElement('div');
            confettiContainer.className = 'confetti';
            document.body.appendChild(confettiContainer);

            for (let i = 0; i < 30; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = `${Math.random() * 100}vw`;
                piece.style.top = `${Math.random() * 20}vh`;
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = `${Math.random() * 0.3}s`;
                piece.style.animationDuration = `${0.8 + Math.random() * 0.5}s`;

                // 随机形状
                if (Math.random() > 0.5) {
                    piece.style.borderRadius = '50%';
                }

                // 随机大小
                const size = 4 + Math.random() * 6;
                piece.style.width = `${size}px`;
                piece.style.height = `${size}px`;

                confettiContainer.appendChild(piece);
            }

            // 1.8秒后移除粒子容器
            setTimeout(() => confettiContainer.remove(), 1800);
        }

        // 修改 toggleChapter 函数，添加庆祝弹窗
        const originalToggleChapter = toggleChapter;
        toggleChapter = (chapterId, event) => {
            if (event) event.stopPropagation();
            const chapter = document.querySelector(`[data-chapter-id="${chapterId}"]`);
            const wasCompleted = chapter.classList.contains('completed');

            originalToggleChapter(chapterId, event);

            // 只有从未完成变成完成时才显示弹窗
            if (!wasCompleted && chapter.classList.contains('completed')) {
                // 给 checkbox 添加动画
                const checkbox = chapter.querySelector('.chapter-checkbox');
                checkbox.classList.add('checked-anim');
                setTimeout(() => checkbox.classList.remove('checked-anim'), 400);

                // 显示庆祝弹窗
                showCelebration();
            }
        };
    </script>
</body>

</html>
