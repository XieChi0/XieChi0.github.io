<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js 后端学习计划</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --code-bg: #1e1e1e;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Project Tabs */
        .project-tabs {
            max-width: 1000px;
            margin: 0 auto 1.5rem;
            padding: 0 1rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .project-tab {
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            background: var(--card-bg);
            color: var(--gray-600);
            box-shadow: var(--shadow);
        }

        .project-tab:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .project-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .project-tab .tab-icon {
            margin-right: 0.5rem;
        }

        .project-tab .tab-count {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-left: 0.5rem;
        }

        /* Progress Bar */
        .progress-section {
            max-width: 1000px;
            margin: 0 auto 1rem;
            padding: 0 1rem;
        }

        .progress-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .progress-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .progress-percentage {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 12px;
            background: var(--gray-200);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--success) 100%);
            border-radius: 6px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .stat-completed .stat-icon { background: var(--success); }
        .stat-remaining .stat-icon { background: var(--gray-300); }

        /* Main Content */
        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Stage Section */
        .stage {
            margin-bottom: 1.5rem;
        }

        .stage-header {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .stage-header:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stage-number {
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .stage.expanded .stage-number {
            background: var(--success);
        }

        .stage-number.completed {
            background: var(--success);
        }

        .stage-info {
            flex: 1;
        }

        .stage-title {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stage-subtitle {
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-top: 0.25rem;
        }

        .stage-progress {
            font-size: 0.85rem;
            color: var(--gray-600);
            font-weight: 500;
        }

        .stage-toggle {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .stage-toggle svg {
            width: 100%;
            height: 100%;
            fill: var(--gray-600);
        }

        .stage.expanded .stage-toggle {
            transform: rotate(180deg);
        }

        /* Chapter List */
        .chapter-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .chapter {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            margin-bottom: 0.75rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            border-left: 4px solid transparent;
            transition: border-color 0.2s ease;
        }

        /* 确保章节列表可见 */
        .stage .chapter-list .chapter {
            margin-left: 0.5rem;
            margin-right: 0.5rem;
        }

        .stage.expanded .chapter-list {
            max-height: 10000px;
            padding-top: 0.75rem;
        }

        .chapter.completed {
            border-left-color: var(--success);
        }

        .chapter-header {
            padding: 1rem 1.25rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .chapter-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--gray-300);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            margin-top: 2px;
        }

        .chapter-checkbox:hover {
            border-color: var(--primary);
        }

        .chapter.completed .chapter-checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .chapter-checkbox svg {
            width: 14px;
            height: 14px;
            fill: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chapter.completed .chapter-checkbox svg {
            opacity: 1;
        }

        .chapter-content {
            flex: 1;
            min-width: 0;
        }

        .chapter-title {
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .chapter-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
        }

        .tag-frequency {
            background: #fef3c7;
            color: #92400e;
        }

        .tag-frequency.high { background: #fee2e2; color: #991b1b; }
        .tag-frequency.medium { background: #fef3c7; color: #92400e; }
        .tag-frequency.low { background: #e0e7ff; color: #3730a3; }

        .tag-time {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        /* Code Section */
        .code-section {
            background: #1a1a1a;
            border-radius: 12px;
            margin-top: 1rem;
            overflow: hidden;
            border: 2px solid #444444;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: #2d2d2d;
            border-bottom: 1px solid #444444;
        }

        .code-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #a0a0b0;
        }

        .code-toggle {
            font-size: 0.85rem;
            color: #818cf8;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-weight: 500;
        }
        .code-toggle:hover {
            text-decoration: underline;
        }

        .code-block {
            position: relative;
            background: #0d0d0d;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: #999999;
        }

        .code-block code {
            color: #999999;
        }

        .code-line {
            display: flex;
            transition: background 0.15s ease;
            padding: 2px 0;
        }

        .code-line:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .line-number {
            color: #888888;
            user-select: none;
            min-width: 3rem;
            text-align: right;
            padding-right: 1.5rem;
            font-weight: 500;
        }

        .line-content {
            flex: 1;
            white-space: pre;
            color: #999999;
        }

        .code-comments {
            display: none;
            background: #1a1a1a;
            padding: 1.25rem;
            border-top: 2px solid #444444;
        }

        .code-comments.show {
            display: block;
        }

        .comment-line {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.85rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .comment-line:last-child {
            margin-bottom: 0;
        }

        .comment-line-number {
            color: #cba6f7;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            min-width: 2.5rem;
            background: #313244;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }

        .comment-text {
            color: #a6e3a1;
            line-height: 1.6;
        }

        /* Professional Tip */
        .pro-tip {
            background: linear-gradient(135deg, #1e3a2f 0%, #1a2e25 100%);
            border: 1px solid #4ade80;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-top: 1rem;
        }

        .pro-tip-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #4ade80;
            font-size: 0.9rem;
        }

        .pro-tip-header svg {
            width: 18px;
            height: 18px;
            fill: #4ade80;
        }

        .pro-tip-content {
            font-size: 0.9rem;
            color: #a7f3d0;
            line-height: 1.6;
        }

        .pro-tip-content code {
            background: rgba(74, 222, 128, 0.15);
            color: #86efac;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--gray-600);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .progress-stats {
                flex-direction: column;
                gap: 0.5rem;
            }

            .stage-header {
                padding: 0.75rem 1rem;
            }

            .chapter-header {
                padding: 0.75rem 1rem;
            }

            .code-block {
                font-size: 0.75rem;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stage {
            animation: fadeIn 0.4s ease forwards;
        }

        .stage:nth-child(1) { animation-delay: 0.05s; }
        .stage:nth-child(2) { animation-delay: 0.1s; }
        .stage:nth-child(3) { animation-delay: 0.15s; }
        .stage:nth-child(4) { animation-delay: 0.2s; }
        .stage:nth-child(5) { animation-delay: 0.25s; }
        .stage:nth-child(6) { animation-delay: 0.3s; }
        .stage:nth-child(7) { animation-delay: 0.35s; }
        .stage:nth-child(8) { animation-delay: 0.4s; }
        .stage:nth-child(9) { animation-delay: 0.45s; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Node.js 后端工程师学习计划</h1>
            <p>面试导向学习路径 | 理论 + 实战</p>
        </div>
    </header>

    <nav class="project-tabs" id="projectTabs">
        <button type="button" class="project-tab active" data-project="wc-backend" onclick="switchProject('wc-backend')">
            <span class="tab-icon">&#128187;</span>
            wc-Backend
            <span class="tab-count">(Express)</span>
        </button>
        <button type="button" class="project-tab" data-project="tb-dock" onclick="switchProject('tb-dock')">
            <span class="tab-icon">&#9881;</span>
            tb-dock-server
            <span class="tab-count">(NestJS)</span>
        </button>
    </nav>

    <section class="progress-section">
        <div class="progress-card">
            <div class="progress-header">
                <h2 id="progressTitle">wc-Backend 学习进度</h2>
                <span class="progress-percentage" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-stats">
                <div class="stat-item stat-completed">
                    <span class="stat-icon"></span>
                    <span>已完成 <strong id="completedCount">0</strong> / <span id="totalCount">0</span> 章节</span>
                </div>
                <div class="stat-item stat-remaining">
                    <span class="stat-icon"></span>
                    <span>预计学习时长：约 <strong id="totalTime">15</strong> 小时</span>
                </div>
            </div>
        </div>
    </section>

    <main class="main-content" id="mainContent">
        <!-- Stages will be generated by JavaScript -->
    </main>

    <footer class="footer">
        <p>点击章节前的复选框标记已完成 | 进度自动保存到本地</p>
    </footer>

    <script>
        // Current selected project
        let currentProject = 'wc-backend';

        // Project info
        const projectInfo = {
            'wc-backend': { name: 'wc-Backend', totalTime: 16 },
            'tb-dock': { name: 'tb-dock-server', totalTime: 12 }
        };

        // Learning plan data for wc-backend (Express)
        const wcBackendPlan = [
            {
                id: 1,
                title: "入门基础",
                subtitle: "目录结构 · 各层职责",
                totalTime: "60min",
                chapters: [
                    {
                        id: "1-1",
                        title: "项目目录结构概览",
                        frequency: "低",
                        frequencyLevel: "low",
                        time: "30min",
                        code: `wch1d_modelingtool_crossplatform/
├── src/                        # 源代码目录【核心】
│   ├── app.js                  # Express 应用入口
│   ├── business/               # 业务逻辑层
│   │   ├── model/             # Sequelize 数据模型
│   │   ├── repository/        # 数据访问层
│   │   └── service/           # 业务服务层
│   ├── framework/              # 框架基础设施层
│   └── routes/                 # 路由定义层
└── projects/                   # 用户项目数据存储`,
                        comments: [
                            { line: "1-2", text: "src/ 是核心目录，所有业务代码都在这里" },
                            { line: "4-6", text: "business 层采用经典三层架构：Model → Repository → Service" },
                            { line: "7", text: "framework 封装了通用工具，避免重复代码" },
                            { line: "9", text: "projects 存放用户上传的文件和数据，与代码分离" }
                        ]
                    },
                    {
                        id: "1-2",
                        title: "各层职责说明",
                        frequency: "低",
                        frequencyLevel: "low",
                        time: "20min",
                        code: `┌─────────────────────────────────────┐
│           routes/ (路由层)        │  ← API 入口，接收请求
├─────────────────────────────────────┤
│           service/ (服务层)        │  ← 业务逻辑处理
├─────────────────────────────────────┤
│         repository/ (数据访问层)    │  ← 数据库 CRUD
├─────────────────────────────────────┤
│           model/ (模型层)          │  ← 数据结构定义
└─────────────────────────────────────┘`,
                        comments: [
                            { line: "1", text: "路由层：只负责接收请求、参数校验、分发到服务层" },
                            { line: "3", text: "服务层：写核心业务逻辑，如「用户登录」「计算引擎」" },
                            { line: "5", text: "数据访问层：封装数据库操作，其他层不直接操作数据库" },
                            { line: "7", text: "模型层：定义数据表结构，如字段类型、默认值、关联关系" }
                        ]
                    }
                ]
            },
            {
                id: 2,
                title: "JWT 认证 (面试高频)",
                subtitle: "Token · 验证 · 刷新",
                totalTime: "125min",
                chapters: [
                    {
                        id: "2-1",
                        title: "JWT Token 生成与验证",
                        frequency: "极高",
                        frequencyLevel: "high",
                        time: "45min",
                        code: `// 生成 Token - 用户登录成功后
const jwt = require('jsonwebtoken');
const secretKey = process.env.JWT_SECRET;

async function login(param) {
    // 1. 验证用户身份（查询数据库）
    const user = await userRepository.getUser(param.name);
    if (!user || user.password !== param.password) {
        throw new Error("用户名或密码错误");
    }
    
    // 2. 生成 Token
    const token = jwt.sign(
        { name: user.name, id: user.id },  // payload：存放用户信息
        secretKey,                           // secret：签名密钥
        { expiresIn: '24h' }               // 24小时后过期
    );
    return token;
}`,
                        comments: [
                            { line: "1-2", text: "jwt.sign() 是 jsonwebtoken 库的函数，用于生成 Token" },
                            { line: "7-9", text: "先验证用户身份，确保账号密码正确" },
                            { line: "12-15", text: "jwt.sign() 接收三个参数：payload(数据)、secret(密钥)、options(配置)" },
                            { line: "13", text: "payload 存放需要存储的用户信息，可以被解码，但不能被篡改（因为有签名保护）" },
                            { line: "15", text: "expiresIn 设置过期时间，这里是 24 小时，过期后需要重新登录" }
                        ],
                        proTip: "专业项目中，JWT 通常会包含更丰富的信息：<br><br><code>{<br>&nbsp;&nbsp;userId: user.id,<br>&nbsp;&nbsp;username: user.name,<br>&nbsp;&nbsp;role: user.role,<br>&nbsp;&nbsp;iat: (issued at) 发布时间,<br>&nbsp;&nbsp;exp: (expiration) 过期时间<br>}</code><br><br>同时会使用 RS256 算法（非对称加密）而非 HS256，提高安全性。"
                    },
                    {
                        id: "2-2",
                        title: "JWT Token 验证中间件",
                        frequency: "极高",
                        frequencyLevel: "high",
                        time: "30min",
                        code: `// 验证 Token 中间件
async function authenticate(req, res, next) {
    // 1. 从请求头获取 Token
    const authHeader = req.headers.authorization;
    if (!authHeader || !authHeader.startsWith('Bearer ')) {
        return res.status(401).json({ message: "未提供 Token" });
    }
    const token = authHeader.substring(7); // 去掉 "Bearer " 前缀
    
    try {
        // 2. 验证 Token 是否有效
        const decoded = jwt.verify(token, secretKey);
        
        // 3. 把用户信息挂到请求对象上
        req.user = decoded;
        next(); // 继续处理下一个中间件
    } catch (err) {
        // 4. Token 无效或已过期
        return res.status(403).json({ message: "无效的身份验证令牌" });
    }
}`,
                        comments: [
                            { line: "5-7", text: "从请求头 Authorization 字段获取 Token，格式是 'Bearer xxxxx'" },
                            { line: "9", text: "jwt.verify() 验证 Token 签名和有效期，如果过期或被篡改会抛出错误" },
                            { line: "11-13", text: "验证成功后，把解码后的用户信息挂到 req.user，后续接口可以直接用" },
                            { line: "14", text: "next() 很重要！调用它才能继续执行后续的中间件和路由处理函数" },

async function withCalculateLock(projectId, calculateFn) {
    // 1. 尝试获取锁
    const success = await projectRepository.startCalculate(projectId);
    if (!success) {
        throw new Error("工程正在计算");  // 锁被占用，直接报错
    }
    
    try {
        // 2. 执行计算任务
        return await calculateFn();
        
    } catch (e) {
        // 3. 出错时释放锁
        await projectRepository.stopCalculate(projectId);
        throw e;  // 重新抛出错误
        
    } finally {
        // 4. 无论成功失败，都要释放锁
        await projectRepository.stopCalculate(projectId);
    }
}`,

function debounce(fn, delay = 300) {
    let timer = null;
    
    return function(...args) {
        // 清除之前的定时器
        clearTimeout(timer);
        
        // 设置新的定时器
        timer = setTimeout(() => {
            // 延迟 delay 毫秒后执行
            fn.apply(this, args);
        }, delay);
    };
}

function deepClone(obj, visited = new WeakMap()) {
    // 1. 处理 null 和基本类型
    if (obj === null || typeof obj !== 'object') {
        return obj;
    }
    
    // 2. 处理循环引用
    if (visited.has(obj)) {
        return visited.get(obj);
    }
    
    // 3. 处理 Date 和 RegExp
    if (obj instanceof Date) return new Date(obj);
    if (obj instanceof RegExp) return new RegExp(obj);
    
    // 4. 创建新对象/数组
    const clone = Array.isArray(obj) ? [] : {};
    visited.set(obj, clone);  // 记录已拷贝的对象
    
    // 5. 递归拷贝所有属性
    for (const key of Object.keys(obj)) {
        clone[key] = deepClone(obj[key], visited);
    }
    
    return clone;
}`,

@Injectable()
export class ItemsService {
  constructor(
    @InjectModel('Item') private itemModel: Model<Item>,
  ) {}

  async findAll(): Promise<Item[]> {
    return this.itemModel.find().exec();
  }

  async findOne(id: string): Promise<Item> {
    const item = await this.itemModel.findById(id);
    if (!item) throw new NotFoundException('Item not found');
    return item;
  }

  async create(item: Partial<Item>): Promise<Item> {
    const newItem = new this.itemModel(item);
    return newItem.save();
  }

  async update(id: string, data: Partial<Item>): Promise<Item> {
    return this.itemModel.findByIdAndUpdate(id, data, { new: true });
  }

  async delete(id: string): Promise<void> {
    await this.itemModel.findByIdAndDelete(id);
  }
}`,

        // All plans
        const allPlans = {
            'wc-backend': wcBackendPlan,
            'tb-dock': tbDockPlan
        };

        // Get current plan
        function getCurrentPlan() {
            return allPlans[currentProject];
        }

        // Switch project
        function _switchProject(project) {
            currentProject = project;

            // Update tabs
            document.querySelectorAll('.project-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.project === project) {
                    tab.classList.add('active');
                }
            });

            // Update progress title
            document.getElementById('progressTitle').textContent = `${projectInfo[project].name} 学习进度`;
            document.getElementById('totalTime').textContent = projectInfo[project].totalTime;

            // Re-render
            renderPlan();
            loadProgress();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPlan();
            loadProgress();
        });

        // Render the learning plan
        function renderPlan() {
            const container = document.getElementById('mainContent');
            const plan = getCurrentPlan();
            let html = '';
            let chapterId = 0;

            plan.forEach((stage, _index) => {
                const stageProgress = calculateStageProgress(stage);
                html += `
                    <div class="stage expanded" data-stage-id="${stage.id}">
                        <div class="stage-header" onclick="toggleStage(${stage.id})">
                            <div class="stage-number">${stage.id}</div>
                            <div class="stage-info">
                                <div class="stage-title">
                                    ${stage.title}
                                </div>
                                <div class="stage-subtitle">${stage.subtitle} · 预计 ${stage.totalTime}</div>
                            </div>
                            <div class="stage-progress">${stageProgress}%</div>
                            <div class="stage-toggle">
                                <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                            </div>
                        </div>
                        <div class="chapter-list">
                            ${stage.chapters.map(chapter => {
                                chapterId++;
                                return renderChapter(chapter, chapterId);
                            }).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            updateTotalProgress();
            document.getElementById('totalCount').textContent = chapterId;
        }

        // Render a single chapter
        function renderChapter(chapter, index) {
            const codeLines = chapter.code.split('\n');
            const linesHtml = codeLines.map((line, i) => `
                <div class="code-line">
                    <span class="line-number">${i + 1}</span>
                    <span class="line-content">${escapeHtml(line) || ' '}</span>
                </div>
            `).join('');

            const commentsHtml = chapter.comments.map(c => `
                <div class="comment-line">
                    <span class="comment-line-number">${c.line}</span>
                    <span class="comment-text">${c.text}</span>
                </div>
            `).join('');

            const proTipHtml = chapter.proTip ? `
                <div class="pro-tip">
                    <div class="pro-tip-header">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        专业写法补充
                    </div>
                    <div class="pro-tip-content">${chapter.proTip}</div>
                </div>
            ` : '';

            return `
                <div class="chapter" data-chapter-id="${chapter.id}">
                    <div class="chapter-header">
                        <div class="chapter-checkbox" onclick="toggleChapter('${chapter.id}')">
                            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                        </div>
                        <div class="chapter-content">
                            <div class="chapter-title">
                                ${index}. ${chapter.title}
                            </div>
                            <div class="chapter-tags">
                                <span class="tag tag-frequency ${chapter.frequencyLevel}">考频：${chapter.frequency}</span>
                                <span class="tag tag-time">预计 ${chapter.time}</span>
                            </div>
                            <div class="code-section">
                                <div class="code-header">
                                    <span class="code-label">代码示例</span>
                                    <span class="code-toggle" onclick="toggleCode(this)">
                                        <span class="toggle-text">展开逐行解释</span>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                                    </span>
                                </div>
                                <div class="code-block">
                                    ${linesHtml}
                                </div>
                                <div class="code-comments">
                                    ${commentsHtml}
                                </div>
                                ${proTipHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Toggle functions
        function _toggleStage(stageId) {
            const stage = document.querySelector(`[data-stage-id="${stageId}"]`);
            stage.classList.toggle('expanded');
        }

        function _toggleChapter(chapterId) {
            const chapter = document.querySelector(`[data-chapter-id="${chapterId}"]`);
            chapter.classList.toggle('completed');
            saveProgress();
            updateTotalProgress();

            // Update stage progress
            const stageId = chapter.closest('.stage').dataset.stageId;
            const plan = getCurrentPlan();
            const stage = plan.find(s => s.id === Number.parseInt(stageId, 10));
            const progressEl = document.querySelector(`[data-stage-id="${stageId}"] .stage-progress`);
            progressEl.textContent = `${calculateStageProgress(stage)}%`;
        }

        function _toggleCode(btn) {
            const comments = btn.closest('.code-section').querySelector('.code-comments');
            const textEl = btn.querySelector('.toggle-text');
            
            if (comments.classList.contains('show')) {
                comments.classList.remove('show');
                textEl.textContent = '展开逐行解释';
            } else {
                comments.classList.add('show');
                textEl.textContent = '收起逐行解释';
            }
        }

        // Progress tracking
        function saveProgress() {
            const completed = Array.from(document.querySelectorAll('.chapter.completed'))
                .map(el => el.dataset.chapterId);
            localStorage.setItem(`nodejs-learning-progress-${currentProject}`, JSON.stringify(completed));
        }

        function loadProgress() {
            const saved = localStorage.getItem(`nodejs-learning-progress-${currentProject}`);
            if (saved) {
                const completed = JSON.parse(saved);
                completed.forEach(chapterId => {
                    const chapter = document.querySelector(`[data-chapter-id="${chapterId}"]`);
                    if (chapter) {
                        chapter.classList.add('completed');
                    }
                });
                updateTotalProgress();
            }
        }

        function updateTotalProgress() {
            const total = document.querySelectorAll('.chapter').length;
            const completed = document.querySelectorAll('.chapter.completed').length;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('progressPercent').textContent = `${percent}%`;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('completedCount').textContent = completed;
        }

        function calculateStageProgress(stage) {
            const chapters = document.querySelectorAll(`[data-stage-id="${stage.id}"] .chapter`);
            const completed = document.querySelectorAll(`[data-stage-id="${stage.id}"] .chapter.completed`);
            return chapters.length > 0 ? Math.round((completed.length / chapters.length) * 100) : 0;
        }

        // Utility
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
